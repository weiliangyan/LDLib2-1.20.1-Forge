modLoader = "javafml"
loaderVersion = "[${loader_version},)"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
authors = "KilaBash"
description = "${mod_description}"
logoFile = "icon.png"
displayURL = "${mod_url}"
issueTrackerURL = "https://github.com/Low-Drag-MC/LDLib2/issues"

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId = "forge"
    mandatory = true
    versionRange = "[${loader_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    mandatory = true
    versionRange = "[${minecraft_version}]"
    ordering = "NONE"
    side = "BOTH"
